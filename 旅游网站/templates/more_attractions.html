<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更多景点 - 探索中国</title>
    <!-- 引入主页相同的样式和依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 继承主页自定义样式 */
        @import url('index.css'); /* 假设主页样式提取到独立CSS文件 */
    </style>
</head>

<body class="font-inter bg-neutral-100 text-neutral-600">
    <!-- 复用主页导航栏 -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm shadow-sm transition-all duration-300">
        <!-- 直接复制index.html中的导航栏代码 -->
        <div class="container mx-auto px-4 py-3 flex flex-wrap items-center justify-between">
            <!-- 导航栏内容（同主页一致） -->
            <div class="flex items-center">
                <a href="/" class="text-primary font-bold text-2xl flex items-center">
                    <i class="fa fa-globe-asia mr-2"></i>
                    <span>Explore China</span>
                </a>
            </div>
            <!-- 桌面导航、搜索框、移动端菜单等代码与主页完全一致 -->
        </div>
    </header>

    <main class="py-20">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16">
                <h2 class="text-[clamp(2rem,4vw,2.5rem)] font-bold text-neutral-700 mb-4">
                    更多景点
                </h2>
                <p class="text-neutral-500 max-w-2xl mx-auto text-lg">
                    发现中国更多令人惊叹的旅游胜地，领略不同地域的魅力。
                </p>
            </div>

            <!-- 景点列表（可从数据库获取，此处为模拟数据） -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- 动态循环生成景点卡片 -->
                {% for attraction in attractions %}
                <div class="bg-white rounded-xl overflow-hidden shadow-md hover:shadow-lg transition-custom group">
                    <div class="relative h-48 overflow-hidden">
                        <img src="{{ attraction.image_url }}" alt="{{ attraction.name }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 right-4">
                            <span class="px-3 py-1 bg-{{ attraction.category_color }} text-white text-xs rounded-full">
                                {{ attraction.category }}
                            </span>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-semibold text-neutral-700 mb-2 group-hover:text-primary transition-custom">
                            {{ attraction.name }}
                        </h3>
                        <p class="text-neutral-500 text-sm mb-4 line-clamp-3">
                            {{ attraction.description }}
                        </p>
                        <div class="flex items-center text-sm text-neutral-400">
                            <span>特色：{{ attraction.features }}</span>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- 分页导航（示例） -->
            <div class="text-center mt-12">
                <div class="flex justify-center space-x-2">
                    <a href="#" class="px-4 py-2 bg-primary text-white rounded-full disabled">
                        上一页
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        1
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        2
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        3
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        ...
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        10
                    </a>
                    <a href="#" class="px-4 py-2 bg-white border border-primary text-primary rounded-full">
                        下一页
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- 复用主页页脚 -->
    <footer class="bg-neutral-800 text-white pt-16 pb-8">
        <!-- 直接复制index.html中的页脚代码 -->
        <div class="container mx-auto px-4">
            <!-- 公司信息、快速链接、联系方式等内容与主页一致 -->
        </div>
    </footer>
</body>

</html>
